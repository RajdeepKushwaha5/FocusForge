<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusForge — Pomodoro Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <!-- Custom Titlebar (draggable) -->
    <div id="titlebar">
      <div id="titlebar-drag" class="drag-region">
        <span class="titlebar-icon">🔥</span>
        <span class="titlebar-text">FocusForge</span>
      </div>
      <div class="titlebar-controls">
        <button id="btn-minimize" class="tb-btn" title="Minimize">─</button>
        <button id="btn-hide" class="tb-btn" title="Hide to Tray">▽</button>
        <button id="btn-close" class="tb-btn tb-close" title="Quit">✕</button>
      </div>
    </div>

    <!-- Main App -->
    <div id="app">
      <!-- Timer Section -->
      <div id="timer-section">
        <div id="mode-tabs">
          <button class="mode-tab active" data-mode="work">Focus</button>
          <button class="mode-tab" data-mode="shortBreak">Short Break</button>
          <button class="mode-tab" data-mode="longBreak">Long Break</button>
        </div>

        <div id="timer-ring-container">
          <svg id="timer-ring" viewBox="0 0 200 200">
            <circle class="ring-bg" cx="100" cy="100" r="90" />
            <circle id="ring-progress" class="ring-progress" cx="100" cy="100" r="90" />
          </svg>
          <div id="timer-display">
            <span id="timer-minutes">25</span><span class="timer-colon">:</span><span id="timer-seconds">00</span>
          </div>
        </div>

        <div id="timer-controls">
          <button id="btn-start" class="control-btn primary">▶ Start</button>
          <button id="btn-reset" class="control-btn secondary">↺ Reset</button>
        </div>

        <div id="session-counter">
          <span id="session-label">Session</span>
          <div id="session-dots"></div>
        </div>
      </div>

      <!-- Task Section -->
      <div id="task-section">
        <div id="task-header">
          <h3>📋 Current Task</h3>
          <button id="btn-copy-stats" class="icon-btn" title="Copy today's stats">📊</button>
        </div>
        <div id="task-input-row">
          <input type="text" id="task-input" placeholder="What are you working on?" maxlength="80" />
          <button id="btn-add-task" class="icon-btn">+</button>
        </div>
        <ul id="task-list"></ul>
      </div>

      <!-- Stats Section -->
      <div id="stats-section">
        <div class="stat-card">
          <span class="stat-value" id="stat-sessions">0</span>
          <span class="stat-label">Sessions</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-minutes">0</span>
          <span class="stat-label">Minutes</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-tasks">0</span>
          <span class="stat-label">Tasks Done</span>
        </div>
      </div>
    </div>

    <script src="/js/neutralino.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
